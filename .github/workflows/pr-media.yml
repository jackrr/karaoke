name: PR Media

on:
  pull_request:
    paths:
      - "frontend/**"
      - "e2e/tests-screenshots/**"
      - "e2e/tests-videos/**"
      - "e2e/playwright.screenshots.config.ts"
      - "e2e/playwright.videos.config.ts"
      - "backend/app/tracks.py"
      - "backend/app/config.py"
      - ".github/workflows/pr-media.yml"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-media-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pr-media:
    name: playwright screenshots + reorder video
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: e2e

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.14

      - name: Install backend deps
        run: uv sync --group dev
        working-directory: ./backend

      - name: Install frontend deps
        run: bun install --frozen-lockfile
        working-directory: ./frontend

      - name: Install e2e deps
        run: bun install --frozen-lockfile
        working-directory: ./e2e

      - name: Install browser binaries
        run: bunx playwright install --with-deps chromium
        working-directory: ./e2e

      - name: Run screenshot capture
        run: bun run screenshots
        working-directory: ./e2e

      - name: Run reorder video capture
        run: bun run videos
        working-directory: ./e2e

      - name: Upload screenshots artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-screenshots
          path: e2e/screenshots/*.png

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-reorder-video
          path: e2e/videos/*.webm

      # GitHub's comment sanitizer strips <video src="..."> for any src
      # outside its own private upload CDN, so a linked/embedded .webm never
      # actually plays inline in a comment. Converting to a GIF sidesteps
      # that: GitHub renders GIFs as plain <img> (like the screenshots) and
      # they autoplay, giving an inline preview without a click-through
      # download.
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Convert video to GIF preview
        run: ffmpeg -i videos/reorder-dnd.webm -vf "fps=12,scale=640:-1:flags=lanczos" videos/reorder-dnd.gif

      # Commits the freshly captured screenshots and GIF preview back onto
      # the PR branch in a single commit so they can be viewed inline (via
      # raw.githubusercontent.com) instead of only as downloadable CI
      # artifacts. The full-quality .webm stays out of the branch (see
      # .gitignore) and is only available via the uploaded artifact above.
      # Skipped for forked PRs, since the default GITHUB_TOKEN can't push to
      # a fork's branch.
      #
      # Loop safety: this workflow only triggers on frontend/**, not on
      # e2e/screenshots/** or e2e/videos/**, so this commit doesn't
      # re-trigger itself. The commit message also carries "[skip ci]" as a
      # backstop, and this is the only workflow that commits PR media, so
      # there's no cross-workflow push race to retry around.
      - name: Commit and push updated media
        if: github.event.pull_request.head.repo.full_name == github.repository
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add e2e/screenshots/*.png e2e/videos/*.gif
          if git diff --cached --quiet; then
            echo "No media changes to commit"
          else
            git commit -m "chore: update PR screenshots and reorder video preview [skip ci]"
            git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
          fi

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- pr-media-bot -->";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const branch = context.payload.pull_request.head.ref;
            const isFork = context.payload.pull_request.head.repo.full_name !== `${context.repo.owner}/${context.repo.repo}`;

            const screenshotFiles = fs
              .readdirSync("e2e/screenshots")
              .filter((f) => f.endsWith(".png"))
              .sort();
            const videoFiles = fs
              .readdirSync("e2e/videos")
              .filter((f) => f.endsWith(".gif"))
              .sort();

            let body;
            if (isFork) {
              const list = [...screenshotFiles, ...videoFiles].map((f) => `- \`${f}\``).join("\n");
              body = `${marker}\n### PR media\n\nCaptured for this PR, but not committed back (forked PR): [view run](${runUrl})\n\n${list}\n`;
            } else {
              const screenshotsRawBase = `https://raw.githubusercontent.com/${context.repo.owner}/${context.repo.repo}/${branch}/e2e/screenshots`;
              const videosRawBase = `https://raw.githubusercontent.com/${context.repo.owner}/${context.repo.repo}/${branch}/e2e/videos`;
              const images = screenshotFiles
                .map((f) => `**${f}**\n\n![${f}](${screenshotsRawBase}/${f})`)
                .join("\n\n");
              const gifs = videoFiles.map((f) => `![${f}](${videosRawBase}/${f})`).join("\n\n");
              body =
                `${marker}\n### Screenshots\n\nUpdated for this PR: [view run](${runUrl})\n\n${images}\n\n` +
                `### Drag-and-drop queue reorder video\n\nGIF preview, no audio/controls — download the \`pr-reorder-video\` artifact from the run for the full-quality \`.webm\`:\n\n${gifs}\n`;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
