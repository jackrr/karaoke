name: E2E

on:
  pull_request:
    paths:
      - "e2e/**"
      - "!e2e/screenshots/**"
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/e2e.yml"
  push:
    branches: [main]
    paths:
      - "e2e/**"
      - "!e2e/screenshots/**"
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/e2e.yml"

permissions:
  contents: read

jobs:
  e2e:
    name: playwright
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: e2e

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.14

      - name: Cache bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('frontend/bun.lock', 'e2e/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('e2e/bun.lock') }}

      - name: Install backend deps
        run: uv sync --group dev
        working-directory: ./backend

      - name: Install frontend deps
        run: bun install --frozen-lockfile
        working-directory: ./frontend

      - name: Install e2e deps
        run: bun install --frozen-lockfile
        working-directory: ./e2e

      - name: Install browser binaries
        run: bunx playwright install --with-deps chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: ./e2e

      - name: Install browser OS dependencies only
        run: sudo bunx playwright install-deps chromium
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: ./e2e

      - name: Run e2e tests
        run: bun run test
        working-directory: ./e2e
