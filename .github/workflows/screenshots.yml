name: Screenshots

on:
  pull_request:
    paths:
      - "frontend/**"
      - "e2e/tests-screenshots/**"
      - "e2e/playwright.screenshots.config.ts"
      - ".github/workflows/screenshots.yml"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: screenshots-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  screenshots:
    name: playwright screenshots
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: e2e

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.14

      - name: Install backend deps
        run: uv sync --group dev
        working-directory: ./backend

      - name: Install frontend deps
        run: bun install --frozen-lockfile
        working-directory: ./frontend

      - name: Install e2e deps
        run: bun install --frozen-lockfile
        working-directory: ./e2e

      - name: Install browser binaries
        run: bunx playwright install --with-deps chromium
        working-directory: ./e2e

      - name: Run screenshot capture
        run: bun run screenshots
        working-directory: ./e2e

      - name: Upload screenshots artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-screenshots
          path: e2e/screenshots/*.png

      # Commits the freshly captured screenshots back onto the PR branch so
      # they can be viewed inline (via raw.githubusercontent.com) instead of
      # only as a downloadable CI artifact. Skipped for forked PRs, since the
      # default GITHUB_TOKEN can't push to a fork's branch.
      #
      # Loop safety: this workflow only triggers on frontend/**, not on
      # e2e/screenshots/**, so this commit doesn't re-trigger itself. The
      # commit message also carries "[skip ci]", which GitHub Actions honors
      # repo-wide as a backstop against any other workflow re-running on it
      # (see .github/workflows/e2e.yml's "!e2e/screenshots/**" exclusion,
      # which exists for the same reason).
      - name: Commit and push updated screenshots
        if: github.event.pull_request.head.repo.full_name == github.repository
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add e2e/screenshots/*.png
          if git diff --cached --quiet; then
            echo "No screenshot changes to commit"
          else
            git commit -m "chore: update PR screenshots [skip ci]"
            git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
          fi

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- pr-screenshots-bot -->";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const branch = context.payload.pull_request.head.ref;
            const isFork = context.payload.pull_request.head.repo.full_name !== `${context.repo.owner}/${context.repo.repo}`;
            const files = fs
              .readdirSync("e2e/screenshots")
              .filter((f) => f.endsWith(".png"))
              .sort();

            let body;
            if (isFork) {
              const list = files.map((f) => `- \`${f}\``).join("\n");
              body = `${marker}\n### Screenshots\n\nCaptured for this PR, but not committed back (forked PR): [view run](${runUrl})\n\n${list}\n`;
            } else {
              const rawBase = `https://raw.githubusercontent.com/${context.repo.owner}/${context.repo.repo}/${branch}/e2e/screenshots`;
              const images = files.map((f) => `**${f}**\n\n![${f}](${rawBase}/${f})`).join("\n\n");
              body = `${marker}\n### Screenshots\n\nUpdated for this PR: [view run](${runUrl})\n\n${images}\n`;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
