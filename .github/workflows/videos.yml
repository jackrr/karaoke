name: Reorder Video

on:
  pull_request:
    paths:
      - "frontend/**"
      - "e2e/tests-videos/**"
      - "e2e/playwright.videos.config.ts"
      - "backend/app/tracks.py"
      - "backend/app/config.py"
      - ".github/workflows/videos.yml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: reorder-video-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  reorder-video:
    name: playwright reorder video
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: e2e

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.14

      - name: Install backend deps
        run: uv sync --group dev
        working-directory: ./backend

      - name: Install frontend deps
        run: bun install --frozen-lockfile
        working-directory: ./frontend

      - name: Install e2e deps
        run: bun install --frozen-lockfile
        working-directory: ./e2e

      - name: Install browser binaries
        run: bunx playwright install --with-deps chromium
        working-directory: ./e2e

      - name: Run reorder video capture
        run: bun run videos
        working-directory: ./e2e

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-reorder-video
          path: e2e/videos/*.webm

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const marker = "<!-- pr-reorder-video-bot -->";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `${marker}\n### Drag-and-drop queue reorder video\n\nA new recording of the drag-and-drop queue reorder flow was captured for this PR: [view run](${runUrl})\n\nDownload the \`pr-reorder-video\` artifact from the run to watch \`reorder-dnd.webm\`.\n`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
