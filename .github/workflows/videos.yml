name: Reorder Video

on:
  pull_request:
    paths:
      - "frontend/**"
      - "e2e/tests-videos/**"
      - "e2e/playwright.videos.config.ts"
      - "backend/app/tracks.py"
      - "backend/app/config.py"
      - ".github/workflows/videos.yml"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: reorder-video-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  reorder-video:
    name: playwright reorder video
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: e2e

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.14

      - name: Install backend deps
        run: uv sync --group dev
        working-directory: ./backend

      - name: Install frontend deps
        run: bun install --frozen-lockfile
        working-directory: ./frontend

      - name: Install e2e deps
        run: bun install --frozen-lockfile
        working-directory: ./e2e

      - name: Install browser binaries
        run: bunx playwright install --with-deps chromium
        working-directory: ./e2e

      - name: Run reorder video capture
        run: bun run videos
        working-directory: ./e2e

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-reorder-video
          path: e2e/videos/*.webm

      # GitHub's comment sanitizer strips <video src="..."> for any src
      # outside its own private upload CDN, so a linked/embedded .webm never
      # actually plays inline in a comment. Converting to a GIF sidesteps
      # that: GitHub renders GIFs as plain <img> (like the screenshots
      # workflow) and they autoplay, giving an inline preview without
      # requiring a click-through download.
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Convert video to GIF preview
        run: ffmpeg -i videos/reorder-dnd.webm -vf "fps=12,scale=640:-1:flags=lanczos" videos/reorder-dnd.gif

      # Commits the freshly captured GIF preview back onto the PR branch so
      # it can be viewed inline (via raw.githubusercontent.com) instead of
      # only as a downloadable CI artifact. The full-quality .webm stays out
      # of the branch (see .gitignore) and is only available via the
      # uploaded artifact above. Skipped for forked PRs, since the default
      # GITHUB_TOKEN can't push to a fork's branch.
      #
      # Loop safety: this workflow only triggers on frontend/**, not on
      # e2e/videos/**, so this commit doesn't re-trigger itself. The commit
      # message also carries "[skip ci]" as a backstop, mirroring
      # screenshots.yml.
      - name: Commit and push updated GIF preview
        if: github.event.pull_request.head.repo.full_name == github.repository
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add e2e/videos/*.gif
          if git diff --cached --quiet; then
            echo "No GIF preview changes to commit"
            exit 0
          fi
          git commit -m "chore: update PR reorder video preview [skip ci]"
          # The screenshots workflow runs concurrently on the same PR push
          # and also commits+pushes to this branch, so a plain push can lose
          # the race. Rebase onto whatever landed first and retry.
          for attempt in 1 2 3 4 5; do
            if git push origin "HEAD:${{ github.event.pull_request.head.ref }}"; then
              break
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "::error::Failed to push GIF preview after 5 attempts"
              exit 1
            fi
            sleep $((attempt * 3))
            git fetch origin "${{ github.event.pull_request.head.ref }}"
            git rebase "origin/${{ github.event.pull_request.head.ref }}"
          done

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- pr-reorder-video-bot -->";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const branch = context.payload.pull_request.head.ref;
            const isFork = context.payload.pull_request.head.repo.full_name !== `${context.repo.owner}/${context.repo.repo}`;
            const files = fs
              .readdirSync("e2e/videos")
              .filter((f) => f.endsWith(".gif"))
              .sort();

            let body;
            if (isFork) {
              const list = files.map((f) => `- \`${f}\``).join("\n");
              body = `${marker}\n### Drag-and-drop queue reorder video\n\nCaptured for this PR, but not committed back (forked PR): [view run](${runUrl})\n\n${list}\n`;
            } else {
              const rawBase = `https://raw.githubusercontent.com/${context.repo.owner}/${context.repo.repo}/${branch}/e2e/videos`;
              const gifs = files.map((f) => `![${f}](${rawBase}/${f})`).join("\n\n");
              body = `${marker}\n### Drag-and-drop queue reorder video\n\nUpdated for this PR (GIF preview, no audio/controls — download the \`pr-reorder-video\` artifact from [the run](${runUrl}) for the full-quality \`.webm\`):\n\n${gifs}\n`;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
