name: Frontend CI

on:
  pull_request:
    branches: [main]

jobs:
  checks:
    name: Run frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run type/style checks
        run: bun run check

      - name: Run tests
        run: bun run test

